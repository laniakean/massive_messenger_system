# API Gateway - Nginx Configuration
upstream auth_service {
    least_conn;
    server auth-service:8001;
}

upstream chat_service {
    least_conn;
    server chat-service:8002;
}

upstream media_service {
    least_conn;
    server media-service:8004;
}

upstream webrtc_service {
    least_conn;
    server webrtc-service:8005;
}

# Rate Limiting
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

server {
    listen 80;
    server_name api.wechat-clone.com;

    # WebSocket 지원을 위한 설정
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Auth Service
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat Service (WebSocket)
    location /api/chat/ws/ {
        proxy_pass http://chat_service/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket 타임아웃 설정
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Chat Service (REST)
    location /api/chat/ {
        limit_req zone=api_limit burst=200 nodelay;
        
        proxy_pass http://chat_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Media Service
    location /api/media/ {
        # 파일 업로드 크기 제한
        client_max_body_size 50M;
        
        proxy_pass http://media_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # 타임아웃 증가 (대용량 파일 업로드)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebRTC Service
    location /api/webrtc/ws/ {
        proxy_pass http://webrtc_service/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Health Check Endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # CORS Headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
    
    # Preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
    }
}

# HTTPS Configuration (for production)
server {
    listen 443 ssl http2;
    server_name api.wechat-clone.com;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ... (위와 동일한 location 블록들)
}
